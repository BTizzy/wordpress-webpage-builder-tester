<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vanessa Headshot Preview</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Ubuntu,sans-serif; margin:0; background:#0a0a0a; color:#ddd; display:flex; min-height:100vh; align-items:center; justify-content:center; padding:40px; }
    .frame { background:linear-gradient(160deg,rgba(255,255,255,0.95),rgba(242,242,242,0.75)); padding:28px 32px 36px; border-radius:28px; box-shadow:0 30px 56px -12px rgba(0,0,0,0.55),0 6px 12px rgba(0,0,0,0.35); max-width:520px; width:100%; }
  h1 { font-size:clamp(1.6rem,3vw,2.2rem); margin:0 0 14px; background:linear-gradient(90deg,#222,#555); -webkit-background-clip:text; background-clip:text; color:transparent; }
    p.note { margin:0 0 24px; font-size:0.95rem; line-height:1.5; color:#444; }
    .preview-wrap { position:relative; }
    img { width:100%; max-width:440px; display:block; margin:0 auto; border-radius:26px; box-shadow:0 18px 36px -10px rgba(0,0,0,0.45),0 8px 18px rgba(0,0,0,0.32); }
    .meta { margin-top:20px; font-size:0.8rem; letter-spacing:0.04em; text-transform:uppercase; color:#666; text-align:center; }
    .bg-grid { position:absolute; inset:-28px -32px -36px; pointer-events:none; z-index:-1; }
    .bg-grid::before { content:""; position:absolute; inset:0; background:radial-gradient(circle at 60% 28%,rgba(212,175,55,0.30),transparent 60%),radial-gradient(circle at 82% 78%,rgba(255,255,255,0.35),transparent 65%); mix-blend-mode:soft-light; }
    @media (max-width:640px){ .frame{padding:22px 22px 28px; border-radius:22px;} img{border-radius:22px;} }
  </style>
</head>
<body>
  <div class="frame">
    <div class="preview-wrap">
      <div class="bg-grid"></div>
      <h1>Vanessa Headshot Preview</h1>
      <p class="note">Tighter crop + neutral gradient replacement background. Decorative border removed for consistency. Use this isolated preview to confirm no distracting background elements remain.</p>
      <img src="trillium-wp-theme/assets/images/vanessa-wolf-headshot.png" alt="Clean cropped professional headshot of Vanessa Wolf" />
      <div class="meta">File: vanessa-wolf-headshot.png · Dimensions: 800×800</div>
    </div>
  </div>
</body>
</html>
